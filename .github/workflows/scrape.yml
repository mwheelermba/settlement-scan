name: Weekly settlements scrape

on:
  schedule:
    - cron: "0 6 * * 0" # Sunday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      # SMTP notification secrets (set in repo Settings → Secrets)
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        id: scrape
        run: python scraper/scrape_settlements.py

      - name: Create pull request
        id: cpr
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): update settlements from scraper"
          title: "Automated settlements update"
          body: |
            Weekly scrape run. This PR is **merged automatically** when the workflow succeeds (squash merge).

            Check the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full scrape report including source status and any warnings.
          branch: automated/settlements-update
          delete-branch: true

      - name: Merge pull request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --delete-branch
