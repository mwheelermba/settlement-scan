name: Weekly settlements scrape

on:
  schedule:
    - cron: "0 6 * * 0" # Sunday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape_settlements.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): update settlements from scraper"
          title: "Automated settlements update"
          body: |
            Weekly scrape run. Please review `data/settlements.json` before merging.
          branch: automated/settlements-update
          delete-branch: true
